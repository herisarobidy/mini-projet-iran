<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${article.title} + ' | Iran War Platform'"></title>
    <meta name="description" content="Article" />
</head>
<body>
<p><a th:href="@{/}">Accueil</a></p>

<article>
    <h1 th:text="${article.title}"></h1>

    <p>
        <span th:text="${article.author}"></span>
        <span> · </span>
        <time th:text="${#temporals.format(article.createdAt, 'yyyy-MM-dd')}"></time>
    </p>

    <div th:if="${article.image != null and !#strings.isEmpty(article.image)}">
        <img th:src="${article.image}" th:alt="${article.title}" />
    </div>

    <div th:utext="${article.content}"></div>
</article>

<section>
    <h2>Commentaires</h2>

    <p th:if="${param.comment} != null and param.comment[0] == 'sent'">Votre commentaire a été envoyé et sera visible après modération.</p>
    <p th:if="${param.comment} != null and param.comment[0] == 'error'">Veuillez remplir tous les champs.</p>

    <div th:if="${#lists.isEmpty(comments)}">
        <p>Aucun commentaire pour le moment.</p>
    </div>

    <div th:if="${!#lists.isEmpty(comments)}">
        <div th:each="c : ${comments}">
            <p>
                <strong th:text="${c.author}"></strong>
                <span> · </span>
                <time th:text="${#temporals.format(c.createdAt, 'yyyy-MM-dd HH:mm')}"></time>
            </p>
            <p th:text="${c.content}"></p>
            <hr />
        </div>
    </div>
</section>

<section>
    <h2>Laisser un commentaire</h2>
    <form th:action="@{/articles/{slug}/comments(slug=${article.slug})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div>
            <label for="author">Nom</label>
            <input id="author" name="author" type="text" required />
        </div>

        <div>
            <label for="content">Commentaire</label>
            <textarea id="content" name="content" rows="6" cols="80" required></textarea>
        </div>

        <button type="submit">Envoyer</button>
    </form>
</section>
</body>
</html>
