<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Article — BackOffice | Iran War Platform</title>
    <meta name="description" content="Création et édition d'articles" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="topbar">
    <div class="topbar-inner">
        <a class="brand" th:href="@{/admin}" style="text-decoration:none;">
            <span class="brand-badge" style="background: var(--accent);"></span>
            <div>
                <span class="brand-name" style="font-size:18px;">BackOffice</span>
                <span class="brand-tagline">Iran War Platform</span>
            </div>
        </a>
        <nav class="nav">
            <a th:href="@{/admin/articles}" class="active">Articles</a>
            <a th:href="@{/admin/categories}">Catégories</a>
            <a th:href="@{/admin/comments}">Commentaires</a>
        </nav>
        <div class="topbar-actions">
            <a class="btn btn-ghost btn-sm" th:href="@{/admin/articles}">← Retour</a>
        </div>
    </div>
</header>

<main class="container" style="padding-top: 32px;">

    <div class="fade-up" style="margin-bottom: 24px;">
        <span class="section-label" th:text="${articleId} != null ? 'Modifier' : 'Nouveau'"></span>
        <h1 style="font-size: clamp(24px, 3vw, 36px); margin-bottom: 4px;"
            th:text="${articleId} != null ? 'Modifier l\'article' : 'Créer un article'"></h1>
        <p style="font-family: var(--font-ui); font-size:14px; color: var(--ink-light); margin:0;">
            Renseignez les informations puis enregistrez.
        </p>
    </div>

    <hr class="divider" />

    <form class="fade-up fade-up-1" id="articleForm"
          th:action="${articleId} != null ? @{/admin/articles/{id}(id=${articleId})} : @{/admin/articles}"
          method="post" th:object="${form}">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="grid">

            <!-- Colonne principale -->
            <div class="col-8">
                <div class="card" style="padding: 24px 28px; margin-bottom: 20px;">
                    <h3 style="font-family: var(--font-ui); font-size:14px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color: var(--ink-muted); margin: 0 0 20px;">
                        Contenu de l'article
                    </h3>

                    <div class="form">
                        <div class="field">
                            <label for="title">Titre <span style="color:var(--accent)">*</span></label>
                            <input id="title" type="text" th:field="*{title}" required
                                   placeholder="Titre accrocheur de l'article" />
                        </div>

                        <div class="field">
                            <label for="author">Auteur <span style="color:var(--accent)">*</span></label>
                            <input id="author" type="text" th:field="*{author}" required
                                   placeholder="Nom et prénom de l'auteur" />
                        </div>

                        <div class="field">
                            <label for="image">Image de couverture (URL)</label>
                            <input id="image" type="text" th:field="*{image}"
                                   placeholder="https://exemple.com/image.jpg" />
                            <small style="font-family: var(--font-ui); color: var(--ink-light);">
                                URL d'une image pour illustrer l'article (optionnel)
                            </small>
                        </div>

                        <div class="field">
                            <label for="content">Contenu <span style="color:var(--accent)">*</span></label>
                            <textarea id="content" th:field="*{content}" rows="20"
                                      placeholder="Rédigez le contenu de l'article..."></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Colonne latérale -->
            <div class="col-4">

                <!-- Publication -->
                <div class="card" style="padding: 20px 22px; margin-bottom: 16px;">
                    <h3 style="font-family: var(--font-ui); font-size:13px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color: var(--ink-muted); margin: 0 0 16px; padding-bottom:12px; border-bottom: 1px solid var(--border);">
                        Publication
                    </h3>
                    <div class="form">
                        <div class="field">
                            <label for="categoryId">Catégorie <span style="color:var(--accent)">*</span></label>
                            <select id="categoryId" th:field="*{categoryId}" required>
                                <option value="">— Choisir une catégorie —</option>
                                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                            </select>
                        </div>

                        <div class="field" style="flex-direction:row; align-items:center; gap:10px; display:flex;">
                            <input id="published" type="checkbox" th:field="*{published}"
                                   style="width:18px; height:18px; cursor:pointer;" />
                            <label for="published" style="font-weight:500; cursor:pointer; margin:0;">
                                Publier immédiatement
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="card" style="padding: 20px 22px;">
                    <h3 style="font-family: var(--font-ui); font-size:13px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color: var(--ink-muted); margin: 0 0 16px; padding-bottom:12px; border-bottom: 1px solid var(--border);">
                        Actions
                    </h3>
                    <div style="display:flex; flex-direction:column; gap:10px;">
                        <button class="btn btn-primary" type="submit" style="width:100%;">
                            Enregistrer l'article
                        </button>
                        <a class="btn btn-ghost" th:href="@{/admin/articles}" style="width:100%; text-align:center;">
                            Annuler
                        </a>
                    </div>
                </div>

            </div>
        </div>

    </form>
</main>

<script src="/vendor/tinymce/tinymce.min.js"></script>
<script>
    if (window.tinymce) {
        tinymce.init({
            license_key: 'gpl',
            selector: '#content',
            menubar: false,
            plugins: 'lists link',
            toolbar: 'undo redo | blocks | bold italic | bullist numlist | link',
            height: 480,
            skin: 'oxide',
            content_css: 'default',
            body_class: 'article-body',
        });
    }

    (function () {
        var form = document.getElementById('articleForm');
        if (!form) return;
        form.addEventListener('submit', function (e) {
            if (window.tinymce) {
                var editor = tinymce.get('content');
                if (editor) {
                    var text = editor.getContent({ format: 'text' }).trim();
                    if (!text) {
                        e.preventDefault();
                        alert('Le contenu est obligatoire.');
                        return;
                    }
                    tinymce.triggerSave();
                }
            }
        });
    })();
</script>
</body>
</html>
