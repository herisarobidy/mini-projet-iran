<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin | Catégories</title>
    <meta name="description" content="Gestion des catégories" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<h1>Catégories</h1>
<p><a th:href="@{/admin}">Retour dashboard</a></p>
<p><a th:href="@{/admin/categories/new}">Créer une catégorie</a></p>

<p th:if="${error} == 'in_use'">Impossible de supprimer : la catégorie est utilisée par au moins un article.</p>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Slug</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c : ${categories}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.name}"></td>
        <td th:text="${c.slug}"></td>
        <td>
            <a th:href="@{/admin/categories/{id}/edit(id=${c.id})}">Modifier</a>
            <form th:action="@{/admin/categories/{id}/delete(id=${c.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit">Supprimer</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
