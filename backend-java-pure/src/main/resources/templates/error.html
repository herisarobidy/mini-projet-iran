<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="'Erreur ' + ${status}">Erreur</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<h1 th:text="'Erreur ' + ${status}">Erreur</h1>

<p th:if="${error != null}" th:text="${error}"></p>
<p th:if="${message != null}" th:text="${message}"></p>

<pre th:if="${trace != null}" th:text="${trace}"></pre>

<p><a th:href="@{/}">Retour à l'accueil</a></p>
</body>
</html>
