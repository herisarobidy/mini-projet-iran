<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Catégorie — BackOffice | Iran War Platform</title>
    <meta name="description" content="Création et édition de catégories" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="topbar">
    <div class="topbar-inner">
        <a class="brand" th:href="@{/admin}" style="text-decoration:none;">
            <span class="brand-badge" style="background: var(--accent);"></span>
            <div>
                <span class="brand-name" style="font-size:18px;">BackOffice</span>
                <span class="brand-tagline">Iran War Platform</span>
            </div>
        </a>
        <nav class="nav">
            <a th:href="@{/admin/articles}">Articles</a>
            <a th:href="@{/admin/categories}" class="active">Catégories</a>
            <a th:href="@{/admin/comments}">Commentaires</a>
        </nav>
        <div class="topbar-actions">
            <a class="btn btn-ghost btn-sm" th:href="@{/admin/categories}">← Retour</a>
        </div>
    </div>
</header>

<main class="container" style="padding-top: 32px;">

    <div class="fade-up" style="margin-bottom: 24px;">
        <span class="section-label" th:text="${categoryId} != null ? 'Modifier' : 'Nouvelle'"></span>
        <h1 style="font-size: clamp(24px, 3vw, 36px); margin-bottom: 4px;"
            th:text="${categoryId} != null ? 'Modifier la catégorie' : 'Créer une catégorie'"></h1>
        <p style="font-family: var(--font-ui); font-size:14px; color: var(--ink-light); margin:0;">
            Les catégories permettent d'organiser les articles par thème.
        </p>
    </div>

    <hr class="divider" />

    <form class="fade-up fade-up-1"
          th:action="${categoryId} != null ? @{/admin/categories/{id}(id=${categoryId})} : @{/admin/categories}"
          method="post" th:object="${form}">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="grid">
            <div class="col-8">
                <div class="card" style="padding: 24px 28px;">
                    <h3 style="font-family: var(--font-ui); font-size:13px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color: var(--ink-muted); margin: 0 0 20px; padding-bottom:12px; border-bottom: 1px solid var(--border);">
                        Informations
                    </h3>
                    <div class="form">
                        <div class="field">
                            <label for="name">Nom <span style="color:var(--accent)">*</span></label>
                            <input id="name" type="text" th:field="*{name}" required
                                   placeholder="Ex : Politique, Économie, Culture..." />
                        </div>
                        <div class="field">
                            <label for="description">Description</label>
                            <textarea id="description" th:field="*{description}" rows="5"
                                      placeholder="Brève description de la catégorie (optionnel)"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-4">
                <div class="card" style="padding: 20px 22px;">
                    <h3 style="font-family: var(--font-ui); font-size:13px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color: var(--ink-muted); margin: 0 0 16px; padding-bottom:12px; border-bottom: 1px solid var(--border);">
                        Actions
                    </h3>
                    <div style="display:flex; flex-direction:column; gap:10px;">
                        <button class="btn btn-primary" type="submit" style="width:100%;">
                            Enregistrer
                        </button>
                        <a class="btn btn-ghost" th:href="@{/admin/categories}" style="width:100%; text-align:center;">
                            Annuler
                        </a>
                    </div>
                </div>
            </div>
        </div>

    </form>
</main>
</body>
</html>
