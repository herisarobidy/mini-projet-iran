<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin | Articles</title>
    <meta name="description" content="Gestion des articles" />
</head>
<body>
<h1>Articles</h1>
<p><a th:href="@{/admin}">Retour dashboard</a></p>
<p><a th:href="@{/admin/articles/new}">Créer un article</a></p>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Titre</th>
        <th>Slug</th>
        <th>Publié</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="a : ${articles}">
        <td th:text="${a.id}"></td>
        <td th:text="${a.title}"></td>
        <td th:text="${a.slug}"></td>
        <td th:text="${a.published}"></td>
        <td>
            <a th:href="@{/admin/articles/{id}/edit(id=${a.id})}">Modifier</a>
            <form th:action="@{/admin/articles/{id}/delete(id=${a.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit">Supprimer</button>
            </form>
            <a th:if="${a.published}" th:href="@{/articles/{slug}(slug=${a.slug})}">Voir</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
